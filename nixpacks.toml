[phases.setup]
nixPkgs = ["nodejs_22", "nodePackages.pnpm"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @vanta-base-admin/api build",
  "pnpm --filter @vanta-base-admin/api deploy --prod /app/api-standalone"
]

[start]
cmd = "node /app/api-standalone/dist/main.js"
